# =============================================================================
# JARVIS Nginx Configuration
# Reverse proxy, WebSocket support, SSL, rate limiting, security headers
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    server_tokens      off;

    # ---------------------------------------------------------------------------
    # Gzip
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=api:20m      rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=voice:10m    rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=general:20m  rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---------------------------------------------------------------------------
    # Upstream definitions
    # ---------------------------------------------------------------------------
    upstream jarvis_backend {
        least_conn;
        server jarvis-backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream jarvis_frontend {
        server jarvis-frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Shared proxy settings
    # ---------------------------------------------------------------------------
    proxy_http_version  1.1;
    proxy_set_header    Upgrade            $http_upgrade;
    proxy_set_header    Connection         $connection_upgrade;
    proxy_set_header    Host               $host;
    proxy_set_header    X-Real-IP          $remote_addr;
    proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto  $scheme;
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;
    proxy_buffer_size   16k;
    proxy_buffers       8 16k;

    # WebSocket connection upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------------------------------------------------------------------------
    # HTTP server — primary config for development; redirects to HTTPS in prod
    #
    # Development: comment out the "return 301" line below to serve on port 80
    # directly (no SSL certificates needed).
    #
    # Production: keep the redirect and provision SSL certs first (see the HTTPS
    # server block below for instructions).
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # In production, redirect all HTTP traffic to HTTPS.
        # Comment out the line below in development (no certs needed).
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS main server
    # NOTE: SSL is only active in production. In development, traffic is served
    # on port 80 by the block above (comment out the redirect if developing locally).
    #
    # Before enabling SSL you must provision TLS certificates, for example:
    #   certbot certonly --webroot -w /var/www/certbot -d <your-domain>
    #
    # Then update server_name below and restart nginx.
    # Replace "localhost" with your domain in production.
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name localhost;  # Replace with your domain in production

        # SSL certificates (Let's Encrypt / Certbot)
        # These paths must exist before nginx will start with SSL.
        # In development, comment out this server block and use port 80 only.
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # SSL hardening
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # HSTS (only send in production once SSL is verified working)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ---------------------------------------------------------------------------
        # Security headers
        # ---------------------------------------------------------------------------
        add_header X-Frame-Options            "SAMEORIGIN"                always;
        add_header X-Content-Type-Options     "nosniff"                   always;
        add_header X-XSS-Protection           "1; mode=block"             always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(self), geolocation=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; media-src 'self' blob:; worker-src 'self' blob:;" always;

        # Connection limits
        limit_conn conn_limit 50;

        # Max upload size (audio files)
        client_max_body_size 30M;

        # ---------------------------------------------------------------------------
        # Backend API
        # ---------------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://jarvis_backend;
        }

        # Authentication endpoints — tighter rate limit
        location ~ ^/api/v1/auth/(login|register|token) {
            limit_req zone=auth burst=5 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://jarvis_backend;
        }

        # Voice upload — slightly relaxed for audio processing time
        location /api/v1/voice/transcribe {
            limit_req zone=voice burst=10 nodelay;
            client_max_body_size 30M;
            proxy_read_timeout 120s;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://jarvis_backend;
        }

        # ---------------------------------------------------------------------------
        # WebSocket — bidirectional voice streaming
        # ---------------------------------------------------------------------------
        location /ws/ {
            limit_req zone=voice burst=20 nodelay;

            proxy_pass http://jarvis_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ---------------------------------------------------------------------------
        # Backend health / metrics (internal only)
        # ---------------------------------------------------------------------------
        location /health {
            proxy_pass http://jarvis_backend/health;
            access_log off;
        }

        # ---------------------------------------------------------------------------
        # Frontend (Next.js)
        # ---------------------------------------------------------------------------
        location / {
            limit_req zone=general burst=60 nodelay;
            proxy_pass http://jarvis_frontend;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
                proxy_pass http://jarvis_frontend;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Next.js HMR WebSocket (dev only — disabled in production)
        location /_next/webpack-hmr {
            proxy_pass http://jarvis_frontend/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ---------------------------------------------------------------------------
        # Error pages
        # ---------------------------------------------------------------------------
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
